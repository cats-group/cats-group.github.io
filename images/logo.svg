<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a3a5c" stroke="#f0a500" stroke-width="5"/>

  <!-- Cat body -->
  <ellipse cx="100" cy="130" rx="38" ry="30" fill="#f0f0e8"/>

  <!-- Cat head -->
  <ellipse cx="100" cy="95" rx="33" ry="30" fill="#f0f0e8"/>

  <!-- Cat ears -->
  <polygon points="72,72 62,48 84,65" fill="#f0f0e8"/>
  <polygon points="128,72 138,48 116,65" fill="#f0f0e8"/>
  <!-- Inner ears -->
  <polygon points="73,70 65,52 83,65" fill="#e8a0a8"/>
  <polygon points="127,70 135,52 117,65" fill="#e8a0a8"/>

  <!-- Cat face -->
  <!-- Eyes -->
  <ellipse cx="87" cy="91" rx="6" ry="7" fill="#1a3a5c"/>
  <ellipse cx="113" cy="91" rx="6" ry="7" fill="#1a3a5c"/>
  <circle cx="85" cy="89" r="2" fill="white"/>
  <circle cx="111" cy="89" r="2" fill="white"/>

  <!-- Nose -->
  <polygon points="100,100 97,104 103,104" fill="#e8a0a8"/>

  <!-- Mouth -->
  <path d="M97,104 Q94,108 90,107" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M103,104 Q106,108 110,107" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="65" y1="97" x2="90" y2="101" stroke="#888" stroke-width="1.2"/>
  <line x1="63" y1="103" x2="89" y2="103" stroke="#888" stroke-width="1.2"/>
  <!-- Whiskers right -->
  <line x1="135" y1="97" x2="110" y2="101" stroke="#888" stroke-width="1.2"/>
  <line x1="137" y1="103" x2="111" y2="103" stroke="#888" stroke-width="1.2"/>

  <!-- Tail -->
  <path d="M138,145 Q168,135 162,118 Q158,108 148,115" fill="none" stroke="#f0f0e8" stroke-width="8" stroke-linecap="round"/>

  <!-- Text: CATS -->
  <text x="100" y="175" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#f0a500" text-anchor="middle" letter-spacing="4">CATS</text>
</svg>
